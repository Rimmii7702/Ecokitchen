<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full Recipe</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f5f7fa;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .recipe-container {
      max-width: 700px;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .recipe-container h1 {
      font-size: 2rem;
      color: #2d3436;
      margin-bottom: 10px;
    }

    .description {
      color: #666;
      margin-bottom: 20px;
    }

    .section-title {
      color: #ff6b6b;
      font-weight: 600;
      margin-top: 20px;
      margin-bottom: 10px;
      font-size: 1.2rem;
    }

    ul {
      padding-left: 20px;
      margin-top: 0;
    }

    .recipe-text {
      background: #f5f7fa;
      padding: 15px;
      border-radius: 12px;
      color: #2d3436;
      white-space: pre-wrap;
    }

    @media (max-width: 600px) {
      .recipe-container {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="recipe-container">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <h1 id="dish-name">Loading...</h1>
    <p class="description" id="dish-description"></p>

    <div class="section-title">Ingredients</div>
    <ul id="ingredients-list"></ul>

    <div class="section-title">Recipe</div>
    <div class="recipe-text" id="dish-recipe"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const key = params.get('dish');
    const specials = JSON.parse(localStorage.getItem('todays_special'));
    const dish = specials[key];
    console.log(specials, key);
    


    if (key && dish) {
      document.getElementById('dish-name').textContent = dish.name;
      document.getElementById('dish-description').textContent = dish.description;

      const ingredientsHTML = dish.ingredients.map(ing => `<li>${ing}</li>`).join('');
      document.getElementById('ingredients-list').innerHTML = ingredientsHTML;
      document.getElementById('dish-recipe').textContent = dish.recipe;
    } else {
      document.querySelector('.recipe-container').innerHTML = '<p>Dish data not found. Please go back and try again.</p>';
    }
  </script>
</body>
</html>
