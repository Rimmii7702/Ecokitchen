<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 80%; max-width: 500px; text-align: center; }
        h1 { color: #ff6f61; margin-bottom: 20px; }
        .error { color: red; margin: 10px 0; }
        .btn { background-color: #ff6f61; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
        .btn:hover { background-color: #e65b50; }
    </style>
</head>
<body>

    <div class="container">
        <button class="back-btn" onclick="history.back()">← Back</button>
        <h1>Inventory Results</h1>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% else %}
            <p>An unexpected error occurred.</p>
        {% endif %}
        <a href="{{ url_for('inverntory') }}" class="btn">Scan Another Video/Image</a>
    </div>
</body>
</html>
